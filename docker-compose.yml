version: "3"

services:

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    env_file:
      - ./backend/.env

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

    prometheus:
      image: prom/prometheus
      container_name: prometheus
      volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      ports:
      - "9090:9090"

  grafana:
      image: grafana/grafana
      container_name: grafana
      ports:
      - "3000:3000"